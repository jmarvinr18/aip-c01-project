<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clarvo — Document Intelligence</title>
<style>
  :root{
    --bg:#f4f1ea; --panel:#fffdf8; --ink:#1f1c17; --muted:#6b6357;
    --accent:#b4471f; --accent2:#1f6f6b; --line:#e3dccd; --user:#eaf1ee;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--ink);height:100vh;display:flex;flex-direction:column;}
  header{padding:14px 18px;border-bottom:2px solid var(--ink);display:flex;align-items:baseline;gap:10px;}
  header h1{font-size:19px;font-weight:800;letter-spacing:-.01em;}
  header h1 span{color:var(--accent);}
  header .sub{font-size:12px;color:var(--muted);}
  header .status{margin-left:auto;font-size:11px;font-family:ui-monospace,monospace;
    padding:3px 9px;border-radius:20px;background:#eee;color:var(--muted);}
  header .status.on{background:#e2efe9;color:var(--accent2);}
  #chat{flex:1;overflow-y:auto;padding:18px;max-width:820px;width:100%;margin:0 auto;}
  .msg{margin-bottom:14px;display:flex;gap:10px;}
  .msg .who{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
    color:var(--muted);flex:none;width:64px;padding-top:2px;}
  .msg .bubble{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:10px 13px;font-size:14.5px;line-height:1.55;white-space:pre-wrap;word-wrap:break-word;flex:1;}
  .msg.user .bubble{background:var(--user);border-color:#cfe0d9;}
  .msg.assistant .who{color:var(--accent);}
  .typing{display:inline-block;}
  .typing::after{content:"▋";animation:blink 1s steps(2) infinite;color:var(--accent);}
  @keyframes blink{0%,50%{opacity:1;}51%,100%{opacity:0;}}
  footer{border-top:1px solid var(--line);padding:12px;background:var(--panel);}
  .composer{max-width:820px;margin:0 auto;display:flex;gap:8px;}
  #q{flex:1;padding:11px 13px;border:1px solid var(--line);border-radius:8px;font-size:14.5px;
    font-family:inherit;resize:none;background:#fff;}
  #q:focus{outline:2px solid var(--accent2);border-color:transparent;}
  #send{padding:0 18px;border:none;border-radius:8px;background:var(--accent);color:#fff;
    font-weight:600;font-size:14px;cursor:pointer;}
  #send:disabled{opacity:.5;cursor:default;}
  .hint{max-width:820px;margin:6px auto 0;font-size:11px;color:var(--muted);text-align:center;}
</style>
</head>
<body>
  <header>
    <h1>Clarvo<span>·</span>Document Intelligence</h1>
    <div class="sub">grounded, cited answers from your documents</div>
    <div class="status" id="status">connecting…</div>
  </header>

  <div id="chat"></div>

  <footer>
    <div class="composer">
      <textarea id="q" rows="1" placeholder="Ask about your documents…" autocomplete="off"></textarea>
      <button id="send">Send</button>
    </div>
    <div class="hint">Streams token-by-token over WebSocket · one session per browser tab</div>
  </footer>

<script src="config.js"></script>
<script>
  // --- session: client owns the id, one per tab, reused every turn ---
  const SESSION_ID = crypto.randomUUID();

  const chat   = document.getElementById("chat");
  const input  = document.getElementById("q");
  const button = document.getElementById("send");
  const statusEl = document.getElementById("status");

  let ws = null;
  let firstTokenTime = null;
  let sentTime = null;

  function addMessage(role, text=""){
    const m = document.createElement("div");
    m.className = "msg " + role;
    m.innerHTML = `<div class="who">${role === "user" ? "You" : "Clarvo"}</div>`;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    m.appendChild(bubble);
    chat.appendChild(m);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  function setStatus(text, on=false){
    statusEl.textContent = text;
    statusEl.classList.toggle("on", on);
  }

  function ask(){
    const question = input.value.trim();
    if (!question) return;

    addMessage("user", question);
    input.value = "";
    input.style.height = "auto";
    button.disabled = true;

    const answerBubble = addMessage("assistant", "");
    answerBubble.classList.add("typing");

    // open a fresh socket per question (simple + avoids idle-timeout handling)
    ws = new WebSocket(CONFIG.WS_URL);
    firstTokenTime = null;

    ws.onopen = () => {
      setStatus("streaming", true);
      sentTime = performance.now();
      ws.send(JSON.stringify({ action: "sendMessage", question, session_id: SESSION_ID }));
    };

    ws.onmessage = (e) => {
      // end-of-stream signal is JSON {done:true}; tokens are raw text
      try {
        const parsed = JSON.parse(e.data);
        if (parsed && parsed.done) { finish(answerBubble); return; }
        if (parsed && parsed.error) { answerBubble.textContent += "\n[error: " + parsed.error + "]"; finish(answerBubble); return; }
      } catch { /* not JSON → it's a token */ }

      if (firstTokenTime === null) {
        firstTokenTime = performance.now();
        console.log("first-token latency (ms):", Math.round(firstTokenTime - sentTime));
      }
      answerBubble.classList.remove("typing");
      answerBubble.textContent += e.data;
      chat.scrollTop = chat.scrollHeight;
    };

    ws.onerror = () => { answerBubble.textContent += "\n[connection error]"; finish(answerBubble); };
    ws.onclose = () => { if (button.disabled) finish(answerBubble); };
  }

  function finish(bubble){
    bubble.classList.remove("typing");
    button.disabled = false;
    setStatus("ready", false);
    if (ws && ws.readyState === WebSocket.OPEN) ws.close();
    input.focus();
  }

  // send on button click or Enter (Shift+Enter = newline)
  button.addEventListener("click", ask);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); ask(); }
  });
  // auto-grow textarea
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 140) + "px";
  });

  setStatus("ready", false);
  input.focus();
</script>
</body>
</html>
